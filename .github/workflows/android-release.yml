name: Build & Release Android APK

on:
  push:
    tags:
      - "v*" # سيعمل فقط عند رفع Tag جديد

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Decode Keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Create gradle.properties
        run: |
          cat >> android/gradle.properties << 'EOF'
          MYAPP_UPLOAD_STORE_FILE=release.keystore
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          hermesEnabled=true
          EOF

      - name: Build Android Release (Forced Optimizations)
        run: |
          cd android
          ./gradlew clean
          ./gradlew assembleRelease \
            -PenableSeparateBuildPerCPUArchitecture=true \
            -PenableProguardInReleaseBuilds=true \
            -PuniversalApk=true \
            --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          body: |
            ### تم البناء بنجاح! 🚀
            تجد أدناه النسخ المقسمة لتقليل الحجم:
            * **app-arm64-v8a-release.apk**: للهواتف الحديثة (حجم صغير).
            * **app-universal-release.apk**: لجميع الهواتف (حجم أكبر).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

