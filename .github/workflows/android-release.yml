name: Build & Release Android APK

on:
  push:
    tags:
      - "v*"
      - "beta-*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_BASE_URL=${{ secrets.EXPO_PUBLIC_BASE_URL }}" >> .env

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Apply Size Optimizations
        run: |
          BUILD_GRADLE="android/app/build.gradle"

          sed -i 's/def enableSeparateBuildPerCPUArchitecture = false/def enableSeparateBuildPerCPUArchitecture = true/' $BUILD_GRADLE
          sed -i 's/universalApk true/universalApk false/' $BUILD_GRADLE
          sed -i 's/def enableProguardInReleaseBuilds = false/def enableProguardInReleaseBuilds = true/' $BUILD_GRADLE

          echo "=== Verify ==="
          grep -E "enableSeparateBuildPerCPUArchitecture|universalApk|enableProguardInReleaseBuilds" $BUILD_GRADLE

      - name: Add ProGuard Rules
        run: |
          cat >> android/app/proguard-rules.pro << 'EOF'
          -keep class com.facebook.react.** { *; }
          -keep class com.facebook.hermes.** { *; }
          -dontwarn com.facebook.**
          -keep class expo.modules.** { *; }
          -dontwarn expo.modules.**
          -assumenosideeffects class android.util.Log {
              public static int v(...);
              public static int d(...);
              public static int i(...);
          }
          EOF

      - name: Decode Release Keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Create gradle.properties
        run: |
          cat >> android/gradle.properties << EOF
          MYAPP_UPLOAD_STORE_FILE=release.keystore
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          hermesEnabled=true
          android.enableR8.fullMode=true
          android.enableMinifyInReleaseBuilds=true
          android.enableShrinkResourcesInReleaseBuilds=true
          android.enableResourceOptimizations=true
          EOF

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            --no-daemon

      - name: List APK outputs
        run: |
          find android/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          prerelease: ${{ startsWith(github.ref_name, 'beta-') }}
          body: |
            ${{ startsWith(github.ref_name, 'beta-') && '### نسخة تجريبية Beta 🧪' || '### إصدار رسمي 🚀' }}
            * **app-arm64-v8a-release.apk** — للهواتف الحديثة
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
