name: Build & Release Android APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      # ✅ prebuild يطبق withAndroidOptimization تلقائياً
      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

        # أضف هذه الخطوة في yml بعد Prebuild مباشرة
      - name: Debug build.gradle
        run: |
          echo "=== Full build.gradle ==="
          cat android/app/build.gradle

      # ✅ تحقق أن الإعدادات طُبقت فعلاً
      - name: Verify Optimizations Applied
        run: |
          echo "=== Checking build.gradle ==="
          grep -E "enableSeparateBuildPerCPUArchitecture|enableProguardInReleaseBuilds|universalApk" android/app/build.gradle || echo "❌ NOT FOUND"

      - name: Decode Keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Create gradle.properties
        run: |
          cat >> android/gradle.properties << 'EOF'
          MYAPP_UPLOAD_STORE_FILE=release.keystore
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          hermesEnabled=true
          EOF

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: List APK outputs
        run: |
          echo "=== APK Files ==="
          find android/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          body: |
            ### تم البناء بنجاح! 🚀
            * **app-arm64-v8a-release.apk** — للهواتف الحديثة (أصغر حجماً).
            * **app-armeabi-v7a-release.apk** — للهواتف القديمة.
            * **app-universal-release.apk** — لجميع الهواتف.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

